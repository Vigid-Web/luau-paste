<!DOCTYPE html><html><head><meta charset="utf-8"><title>Luau Paste</title>
<style>body{background:#000;color:#eee;font-family:sans-serif;display:flex;justify-content:center;padding:40px} .box{width:100%;max-width:800px} textarea{width:100%;height:300px;background:#111;color:#0f0;border:1px solid #333;padding:10px;font-family:monospace} button{padding:12px 20px;background:#0f0;border:none;font-weight:bold;cursor:pointer;margin-top:10px} .mine{margin-top:30px}</style>
</head><body><div class="box">
<h1>Paste[encrypt]</h1>
<textarea id="code" placeholder="paste your Luau here"></textarea><br>
<button id="create">Create Encrypted Paste</button>
<div class="mine" id="mine"></div>
<script>
async function loadMine(){
  const list=JSON.parse(localStorage.getItem('my_pastes')||'[]');
  document.getElementById('mine').innerHTML='<h3>Your Pastes</h3>'+list.map(p=>`<p><a href="/p/${p.id}" style="color:#0f0">/p/${p.id}</a></p>`).join('');
}
loadMine();
document.getElementById('create').onclick=async()=>{
  const content=document.getElementById('code').value;
  const r=await fetch('/api/paste',{method:'POST',body:content});
  const j=await r.json();
  localStorage.setItem('paste_'+j.id,j.owner);
  const list=JSON.parse(localStorage.getItem('my_pastes')||'[]'); list.unshift({id:j.id}); localStorage.setItem('my_pastes',JSON.stringify(list));
  location.href=j.view;
};
</script></div></body></html>
