<!DOCTYPE html><html><head><meta charset="utf-8"><title>Luau Paste</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#ddd;font-family:Inter,sans-serif;height:100vh;display:flex}
aside{width:260px;background:#0a0a0a;border-right:1px solid #222;padding:15px;overflow-y:auto}
aside h3{margin:0 0 10px;color:#0f0;font-size:14px;text-transform:uppercase;letter-spacing:1px}
aside ul{list-style:none;padding:0;margin:0}
aside li{padding:8px 10px;margin-bottom:6px;background:#111;border:1px solid #222;border-radius:6px;cursor:pointer;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
aside li:hover{background:#151515}
main{flex:1;padding:30px;overflow-y:auto}
textarea{width:100%;height:300px;background:#111;color:#0f0;border:1px solid #333;padding:12px;font-family:monospace;border-radius:8px}
button{padding:12px 20px;background:#0f0;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:12px}
#ctx{position:fixed;background:#111;border:1px solid #333;border-radius:6px;display:none;z-index:999}
#ctx div{padding:8px 14px;cursor:pointer;font-size:13px}
#ctx div:hover{background:#222}
</style></head><body>
<aside>
  <h3>Saved Session</h3>
  <ul id="list"></ul>
</aside>
<main>
  <h1 style="color:#0f0">Paste[encryption]</h1>
  <textarea id="code" placeholder="Created By Markdetet"></textarea><br>
  <button id="create">Create Encrypted Paste</button>
</main>
<div id="ctx"><div id="edit">Edit</div><div id="del">Delete</div></div>
<script>
const list=document.getElementById('list');
function loadList(){
  const pastes=JSON.parse(localStorage.getItem('my_pastes')||'[]');
  list.innerHTML='';
  pastes.forEach(p=>{
    const li=document.createElement('li');
    li.textContent=p.preview||p.id;
    li.dataset.id=p.id;
    li.onclick=()=>location.href='/p/'+p.id;
    li.oncontextmenu=e=>{e.preventDefault();showMenu(e,p.id)};
    list.appendChild(li);
  });
}
loadList();
let currentId=null;
function showMenu(e,id){currentId=id;const m=document.getElementById('ctx');m.style.left=e.pageX+'px';m.style.top=e.pageY+'px';m.style.display='block'}
document.addEventListener('click',()=>document.getElementById('ctx').style.display='none');
document.getElementById('edit').onclick=()=>location.href='/p/'+currentId;
document.getElementById('del').onclick=async()=>{
  if(!confirm('Delete paste?')) return;
  const token=localStorage.getItem('paste_'+currentId);
  await fetch('/api/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:currentId,owner:token})});
  localStorage.removeItem('paste_'+currentId);
  let pastes=JSON.parse(localStorage.getItem('my_pastes')||'[]'); pastes=pastes.filter(p=>p.id!==currentId); localStorage.setItem('my_pastes',JSON.stringify(pastes));
  loadList();
};
document.getElementById('create').onclick=async()=>{
  const content=document.getElementById('code').value;
  if(!content) return alert('empty');
  const r=await fetch('/api/paste',{method:'POST',body:content});
  const j=await r.json();
  localStorage.setItem('paste_'+j.id,j.owner);
  const preview=content.split('\n')[0].slice(0,40);
  let pastes=JSON.parse(localStorage.getItem('my_pastes')||'[]'); pastes.unshift({id:j.id,preview}); localStorage.setItem('my_pastes',JSON.stringify(pastes));
  location.href=j.view; // goes to new page
};
</script></body></html>
